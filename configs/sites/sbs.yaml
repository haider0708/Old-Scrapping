# SBS Informatique - Full CSR (Playwright all phases)
# Platform: PrestaShop + TvCMS MegaMenu
base_url: "https://www.sbsinformatique.com"

settings:
  max_retries: 3
  retry_delay: 2
  max_consecutive_failures: 10
  request_timeout: 30
  page_timeout: 30000
  wait_after_load: 2

selectors:
  frontpage:
    wait_selector: "div.block-categories ul.category-top-menu"
    top_level_items: "li[data-depth='0'] > a"
    low_level_items: "li[data-depth='1'] > a.category-sub-link"
    subcategory_items: "li[data-depth='2'] > a.category-sub-link, li[data-depth='3'] > a.category-sub-link"

  category_page:
    wait_selector: "article.product-miniature.js-product-miniature"
    grid_scope: ""
    item_selector: "article.product-miniature.js-product-miniature"
    item_id_attr: "data-id-product"
    item_name: "h6[itemprop='name']"
    item_name_alt: "div.tvproduct-name.product-title a h6"
    item_url: "div.tvproduct-name.product-title a"
    item_image: "img.tvproduct-defult-img.tv-img-responsive"
    item_image_attrs: ["src"]
    item_price: ".product-price-and-shipping span.price"
    item_old_price: ".product-price-and-shipping span.regular-price"
    pagination_next: "a.next.js-search-link[rel='next']"
    pagination_param: "page"

  product_page:
    wait_selector: "div.current-price span.price"
    title: "h1.h1[itemprop='name']"
    price: "div.current-price span.price[itemprop='price']"
    price_content_attr: "content"
    old_price: "div.product-discount span.regular-price"
    sku: "div.product-reference span[itemprop='sku']"
    brand: "a.tvproduct-brand img"
    brand_attr: "src"
    availability: "span#product-availability"
    availability_schema: "link[itemprop='availability'][href]"
    description: "div[id^='product-description-short-']"
    full_description: "div.tab-pane#description div.product-description"
    specs_container: "div.product-features dl.data-sheet"
    specs_key: "dt.name"
    specs_value: "dd.value"
    image_main: "div.tvproduct-image-slider img[itemprop='image']"
    image_thumbnails: "img.thumb.js-thumb"
