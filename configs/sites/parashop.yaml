# Parashop - SSR (httpx + selectolax)
# Platform: OpenCart 3.x + Journal 3 Theme
base_url: "https://www.parashop.tn"

settings:
  max_retries: 3
  retry_delay: 2
  max_consecutive_failures: 10
  request_timeout: 30

selectors:
  frontpage:
    nav_container: "div.desktop-main-menu-wrapper div#main-menu > ul.j-menu"
    top_level_blocks: "ul.j-menu > li.menu-item.main-menu-item.dropdown.mega-menu"
    top_level_link: "a.dropdown-toggle"
    top_level_name: "a.dropdown-toggle > span.links-text"
    low_level_items: "div.dropdown-menu.j-dropdown div.module-item > div.item-content > a.catalog-title"
    subcategory_items: "div.item-assets > div.subitems > div.subitem > a"

  category_page:
    item_selector: "div.product-layout.has-extra-button"
    item_id_input: "input[type='hidden'][name='product_id']"
    item_id_attr: "value"
    item_name: "div.caption > div.name > a"
    item_url: "div.caption > div.name > a"
    item_image: "a.product-img img.img-first"
    item_image_attrs: ["src", "data-src", "data-largeimg"]
    item_price: "span.price-new"
    item_old_price: "span.price-old"
    item_brand: "div.caption > div.stats span.stat-1 span a"
    pagination_next: "li > a.next"
    pagination_param: "page"

  product_page:
    title: "div.product-details > div.title.page-title"
    sku: "li.product-model > span"
    price: "div.product-price-group div.product-price-new"
    old_price: "div.product-price-group div.product-price-old"
    availability_in_stock: "li.product-stock.in-stock > span"
    availability_out_of_stock: "li.product-stock.out-of-stock > span"
    brand: "div.brand-image.product-manufacturer a span"
    description: "div.tabs-container.product_tabs div.tab-pane.active"
    lightgallery: "div.lightgallery.lightgallery-product-images"
    lightgallery_attr: "data-images"
    images_main: "div.swiper.main-image div.swiper-slide img"
    images_main_attr: "data-largeimg"
