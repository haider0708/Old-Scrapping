# Pharmacie Plus - Full CSR (Playwright all phases)
# Platform: Custom PHP + Bootstrap 4 + Htmlstream MegaMenu
base_url: "https://parapharmacieplus.tn"

settings:
  max_retries: 3
  retry_delay: 2
  max_consecutive_failures: 10
  request_timeout: 30
  page_timeout: 15000
  wait_after_load: 2

selectors:
  frontpage:
    wait_selector: "ul.navbar-nav.u-header__navbar-nav"
    top_level_blocks: "ul.navbar-nav.u-header__navbar-nav > li.nav-item.hs-has-mega-menu"
    top_level_link: "a.nav-link"
    low_level_items: "div.hs-mega-menu.u-header__sub-menu div.col-3 > a"
    low_level_name: "span.u-header__sub-menu-title"
    subcategory_items: "ul.u-header__sub-menu-nav-group > li > a.u-header__sub-menu-nav-link"

  category_page:
    wait_selector: "li.col-md-mc-5.col-fix.item-prod"
    item_selector: "li.col-md-mc-5.col-fix.item-prod"
    item_name: "div.text-truncate.name-prod-card"
    item_url: "a.text-gray-100.justify-content-around"
    item_image: "div.product-item__inner.position-relative img"
    item_image_attrs: ["src", "data-src"]
    item_price: "div.info-ligne-card div.text-red"
    item_old_price: "del.font-size-12"
    pagination_next_icon: "li.page-item a.page-link i.fa.fa-angle-right"

  product_page:
    wait_selector: "h1.font-size-25"
    title: "h1.font-size-25.text-lh-1dot2"
    price: "ins.font-size-36.text-decoration-none"
    price_schema: "meta[itemprop='price'][content]"
    old_price: "del.font-size-20.ml-2.text-gray-6"
    availability_schema: "link[itemprop='availability'][href*='schema.org/InStock']"
    description: "div#tab-description"
    image_gallery: "div.fotorama"
    image_main: "div.fotorama__stage__frame.fotorama__active img.fotorama__img"
    image_all: "div.fotorama img.fotorama__img"
