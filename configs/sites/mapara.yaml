# Mapara Tunisie - SSR (httpx + selectolax)
# Platform: WooCommerce + Flatsome/UX Builder
base_url: "https://www.maparatunisie.tn"

settings:
  max_retries: 3
  retry_delay: 2
  max_consecutive_failures: 10
  request_timeout: 30

selectors:
  frontpage:
    nav_container: "ul.nav.header-nav.header-bottom-nav"
    top_level_blocks: "ul.header-nav.header-bottom-nav > li.menu-item.has-dropdown"
    top_level_link: "a.nav-top-link"
    mega_low: "div.sub-menu.nav-dropdown div.text.text-mega p > a"
    simple_low: "ul.sub-menu.nav-dropdown.nav-dropdown-simple > li.menu-item > a"

  category_page:
    item_selector: "div.product-small.col"
    item_id_selector: "a.add_to_cart_button"
    item_id_attr: "data-product_id"
    item_name: "p.name.product-title a.woocommerce-LoopProduct-link"
    item_url: "a.woocommerce-LoopProduct-link"
    item_image: "div.image-fade_in_back picture img"
    item_image_attrs: ["src", "data-src"]
    item_price: "ins span.woocommerce-Price-amount bdi"
    item_old_price: "del span.woocommerce-Price-amount bdi"
    pagination_next: "a.next.page-number"
    pagination_path: "/page/{n}/"

  product_page:
    title: "h1.product-title.product_title.entry-title"
    price: "p.price ins span.woocommerce-Price-amount bdi"
    old_price: "p.price del span.woocommerce-Price-amount bdi"
    availability_add_to_cart: "form.cart button[name='add-to-cart']"
    brand: "a[href*='/nos-marques/'] img"
    brand_attr: "alt"
    description: "div.woocommerce-Tabs-panel--description"
    image_main: "div.woocommerce-product-gallery__image.slide.first img.wp-post-image"
    image_gallery: "div.woocommerce-product-gallery__image.slide a"
