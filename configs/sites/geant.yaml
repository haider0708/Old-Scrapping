# Geant Drive - SSR (httpx + selectolax)
# Platform: PrestaShop + WB MegaMenu
# NOTE: No detail pages - listing data is used as details
base_url: "https://www.geantdrive.tn/tunis-city"
skip_details: true

settings:
  max_retries: 3
  retry_delay: 2
  max_consecutive_failures: 10
  request_timeout: 30

selectors:
  frontpage:
    top_level_blocks: "ul.menu-content.top-menu > li.level-1"
    top_level_link: "a[href]"
    top_level_name: "a > span"
    low_level_blocks: "div.wb-sub-menu li.menu-item.item-header"
    low_level_link: "a.category_header"

  category_page:
    item_selector: "article.product-miniature.js-product-miniature"
    item_id_attr: "data-id-product"
    item_name: "h2.h3.product-title[itemprop='name'] a"
    item_url: "h2.product-title a[href]"
    item_image: "a.thumbnail.product-thumbnail img.img-responsive"
    item_image_attrs: ["src", "data-src", "data-full-size-image-url"]
    item_price: "span.price[itemprop='price']"
    item_brand: "p.manufacturer_product"
    pagination_next: "a.next.js-search-link[rel='next']"
    pagination_pages: "ul.page-list a.js-search-link"
    pagination_param: "page"
