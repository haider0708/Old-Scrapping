# Parafendri - SSR (httpx + selectolax)
# Platform: PrestaShop + PosThemes MegaMenu
base_url: "https://parafendri.tn"

settings:
  max_retries: 3
  retry_delay: 2
  max_consecutive_failures: 10
  request_timeout: 30

selectors:
  frontpage:
    nav_container: "div#_desktop_megamenu div.pos-menu-horizontal > ul.menu-content"
    top_level_blocks: "ul.menu-content > li.menu-item"
    top_level_link: "a"
    top_level_name: "a > span"
    mega_low: "div.pos-sub-menu.menu-dropdown div.pos-menu-col > ul.ul-column > li.submenu-item > a"
    simple_low: "div.menu-dropdown.cat-drop-menu > ul.pos-sub-inner > li > a"
    subcategory_items: "li.submenu-item > ul.category-sub-menu > li > a"

  category_page:
    item_selector: "article.product-miniature.js-product-miniature"
    item_id_attr: "data-id-product"
    item_name: "h2.product-title a"
    item_url: "h2.product-title a"
    item_image: "a.thumbnail.product-thumbnail > img"
    item_image_attrs: ["data-src", "data-full-size-image-url", "src"]
    item_price: "div.product-price-and-shipping span.price"
    item_old_price: "span.regular-price"
    pagination_next: "a.next.js-search-link[rel='next']"
    pagination_param: "page"

  product_page:
    json_data: "#product-details[data-product]"
    json_data_attr: "data-product"
    title: "h1.h1.namne_details[itemprop='name']"
    price: "div.current-price > span[itemprop='price']"
    price_content_attr: "content"
    old_price: "div.product-discount > span.regular-price"
    brand: "div.product-manufacturer img.manufacturer-logo"
    brand_attr: "alt"
    sku: "p.reference > span"
    description: "div#description div.product-description"
    image_main: "div.product-cover.slider-for div.easyzoom img[itemprop='image']"
    image_thumbnails: "ul.product-images.slider-nav img.thumb.js-thumb"
