site_name: "batam"
base_url: "https://www.batam.com.tn"

selectors:
  categories:
    level_0:
      container: "li.level-0.parent-ul-list"

      name:
        selector: "button.level-0 span.text-left"
        type: text

      url:
        selector: "ul.level-1 > li > a.font-bold"
        type: href
        optional: true

      children:
        level_1:
          container: "ul.level-1 > li"

          main_category:
            selector: "a.font-bold"
            type: link
            optional: true
            fields:
              name: text
              url: href

          sub_categories:
            selector: "a[href]:not(.font-bold)"
            type: list
            fields:
              name: text
              url: href

          children:
            level_2:
              container: "ul.level-2 > li"

              category:
                selector: "a[href]"
                type: link
                fields:
                  name: text
                  url: href

  category_page:
    item_selector: "form.product_addtocart_form"
    pagination:
      container: ".pagination, .pager"
      next_selector: ".next, .pagination-next"
      max_pages: 10

  product_details:
    product_id:
      selector: "input[name='product']"
      type: value

    title:
      selector: "h1 span.base"
      type: text

    availability:
      selector: "span.text-green-500, span.text-blue, span.text-red"
      type: text
      optional: true

    price:
      selectors:
        - ".final-price .price"
        - "[data-price-type='finalPrice'] .price"
      fallback:
        selector: "meta[itemprop='price']"
        attribute: "content"
        type: float
      type: text
      transform: "clean_price"

    old_price:
      selectors:
        - ".old-price .price"
        - "[data-price-type='oldPrice'] .price"
      type: text
      transform: "clean_price"
      optional: true

    images:
      selector: ".gallery-placeholder img, img.fotorama__img"
      type: src
      multiple: true
      deduplicate: true
      limit: 10

    fiche_technique:
      container: "table.additional-attributes tbody tr"
      key_selector: "th"
      value_selector: "td"
      type: key_value_pairs
